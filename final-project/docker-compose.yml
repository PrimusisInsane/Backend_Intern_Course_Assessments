services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/backend_db
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - postgres
      - redis
      - mongo

  worker:
    build: .
    command: arq app.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/backend_db
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - postgres
      - redis
      - mongo

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=backend_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db


  test-postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=test_db
    ports:
      - "5433:5432"

volumes:
  postgres_data:
  mongo_data: