type User {
  id: Int!
  name: String!
  email: String!
  age: Int
  role: String!
  tasks: [Task!]!
}

type Project {
  id: Int!
  name: String!
  tasks: [Task!]!
}

type Task {
  id: Int!
  title: String!
  done: Boolean
  userId: Int!
  projectId: Int!
}



type ActivityLog {
  id: Int!
  userId: Int!
  taskId: Int!
  action: String!
  detail: String
  createdAt: String!
}

type AuthPayload {
  accessToken: String!
  tokenType: String!
}

type Query {
  me: User!
  users: [User!]!
  user(id: Int!): User!
  taskLogs(taskId: Int!): [ActivityLog!]!
  projectLogs(projectId: Int!): [ActivityLog!]!

  redisHealth: String!

  projects(limit: Int, offset: Int): [Project!]!
  project(id: Int!): Project!
  projectTasks(projectId: Int!): [Task!]!
  getProjectById(id: Int!): Project!
  searchProjects(keyword: String!): [Project!]!

 tasks(limit: Int, offset: Int, done: Boolean): [Task!]!
  task(id: Int!): Task!
  getTaskById(id: Int!): Task!
  searchTasks(keyword: String!): [Task!]!
}

input RegisterInput {
  name: String!
  email: String!
  age: Int!
  password: String!
}

input LoginInput {
  email: String!
  password: String!
}

input CreateProjectInput {
  name: String!
}

input UpdateProjectInput {
  name: String
}

input CreateTaskInput {
  title: String!
  projectId: Int!
}

input UpdateTaskInput {
  title: String
  projectId: Int
  done : Boolean
}

type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!

  createProject(input: CreateProjectInput!): Project!
  updateProject(id: Int!, input: UpdateProjectInput!): Project!
  deleteProject(id: Int!): Boolean!

  createTask(input: CreateTaskInput!): Task!
  updateTask(id: Int!, input: UpdateTaskInput!): Task!
  deleteTask(id: Int!): Boolean!
  changeTaskStatus(id: Int!, done: Boolean!): Task!
}
