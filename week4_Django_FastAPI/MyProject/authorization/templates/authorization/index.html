<!DOCTYPE html>
<html>
<head><title>Authorizations</title></head>
<body>
  <h1>My Authorizations</h1>
  <a href="{% url 'index' %}">Add New Member</a>
  <ul>
    {% for member in authorization %}
      <li>{{ member.firstname }} {{ member.lastname }} - {{ member.phone }} - {{ member.joined_date }}</li>
    {% empty %}
      <li>Nothing yet.</li>
    {% endfor %}
  </ul>
</body>
</html>
